spring:
  application:
    name: flowpilot-api

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/flowpilot?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

flowpilot:
  jwt:
    secret: ${JWT_SECRET:b3Zlcmx5LWxvbmctc2VjcmV0LWtleS1mb3ItZmxvd3BpbG90LWFwcC0yMDI0}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
